services:
  minio:
    image: minio/minio:latest
    container_name: wildfire-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc:latest
    container_name: wildfire-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/wildfire-data
      "

  spark-master:
    image: apache/spark:3.5.6
    container_name: wildfire-spark-master
    depends_on:
      minio:
        condition: service_healthy
    working_dir: /workspace
    environment:
      SPARK_CONF_DIR: /workspace/spark-conf
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wildfire-data
    volumes:
      - .:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8080:8080"

  spark-worker:
    image: apache/spark:3.5.6
    container_name: wildfire-spark-worker
    depends_on:
      spark-master:
        condition: service_started
      minio:
        condition: service_healthy
    working_dir: /workspace
    environment:
      SPARK_CONF_DIR: /workspace/spark-conf
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wildfire-data
    volumes:
      - .:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2G
      - --webui-port
      - "8081"
    ports:
      - "8081:8081"

volumes:
  minio-data:
