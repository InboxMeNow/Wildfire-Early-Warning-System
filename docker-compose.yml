services:
  minio:
    image: minio/minio:latest
    container_name: wildfire-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  create-bucket:
    image: minio/mc:latest
    container_name: wildfire-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minioadmin minioadmin &&
      mc mb --ignore-existing local/wildfire-data
      "

  spark-master:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: wildfire-spark:3.5.6
    container_name: wildfire-spark-master
    depends_on:
      minio:
        condition: service_healthy
    working_dir: /workspace
    environment:
      SPARK_CONF_DIR: /workspace/spark-conf
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wildfire-data
    volumes:
      - .:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.master.Master
      - --host
      - spark-master
      - --port
      - "7077"
      - --webui-port
      - "8080"
    ports:
      - "7077:7077"
      - "8082:8080"

  spark-worker:
    build:
      context: .
      dockerfile: docker/spark/Dockerfile
    image: wildfire-spark:3.5.6
    container_name: wildfire-spark-worker
    depends_on:
      spark-master:
        condition: service_started
      minio:
        condition: service_healthy
    working_dir: /workspace
    environment:
      SPARK_CONF_DIR: /workspace/spark-conf
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wildfire-data
    volumes:
      - .:/workspace
    command:
      - /opt/spark/bin/spark-class
      - org.apache.spark.deploy.worker.Worker
      - spark://spark-master:7077
      - --cores
      - "2"
      - --memory
      - 2G
      - --webui-port
      - "8081"
    ports:
      - "8083:8081"

  kafka:
    image: bitnamilegacy/kafka:3.6
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_ENABLE_KRAFT: "yes"
      KAFKA_CFG_NODE_ID: "1"
      KAFKA_CFG_PROCESS_ROLES: broker,controller
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,INTERNAL://:29092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,INTERNAL://kafka:29092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,INTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      ALLOW_PLAINTEXT_LISTENER: "yes"
    volumes:
      - kafka-data:/bitnami/kafka
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics.sh --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 12

  kafka-init:
    image: bitnamilegacy/kafka:3.6
    container_name: wildfire-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: >
      /bin/bash -c "
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic fire-events --partitions 3 --replication-factor 1 &&
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic weather-updates --partitions 3 --replication-factor 1 &&
      kafka-topics.sh --bootstrap-server kafka:29092 --create --if-not-exists --topic alerts --partitions 3 --replication-factor 1
      "

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local-wildfire
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      DYNAMIC_CONFIG_ENABLED: "true"

  airflow:
    build:
      context: .
      dockerfile: docker/airflow/Dockerfile
    image: wildfire-airflow:2.8.0
    container_name: wildfire-airflow
    depends_on:
      minio:
        condition: service_healthy
      create-bucket:
        condition: service_completed_successfully
      spark-master:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    ports:
      - "8081:8080"
    environment:
      AIRFLOW__CORE__EXECUTOR: SequentialExecutor
      AIRFLOW__CORE__LOAD_EXAMPLES: "false"
      AIRFLOW__CORE__DAGS_ARE_PAUSED_AT_CREATION: "false"
      AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: sqlite:////opt/airflow/airflow.db
      AIRFLOW_CONN_SPARK_DEFAULT: '{"conn_type":"spark","host":"spark://spark-master","port":7077}'
      AIRFLOW_PROJECT_DIR: /opt/airflow/project
      AIRFLOW_PROJECT_PYTHON: python
      JAVA_HOME: /usr/lib/jvm/java-17-openjdk-amd64
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
      MINIO_BUCKET: wildfire-data
      FIRMS_MAP_KEY: ${FIRMS_MAP_KEY:-}
      MAP_KEY: ${MAP_KEY:-}
      _PIP_ADDITIONAL_REQUIREMENTS: >-
        apache-airflow-providers-apache-spark==4.7.1
        pyspark==3.5.6
        kafka-python
        boto3
        requests
        pandas
        pyarrow
        meteostat
        numpy
        scikit-learn
        folium
    volumes:
      - ./dags:/opt/airflow/dags
      - ./src:/opt/airflow/src
      - .:/opt/airflow/project
      - airflow-logs:/opt/airflow/logs
    command:
      - bash
      - -c
      - |
        airflow db init || true
        airflow db migrate || true
        airflow users create \
          --username admin \
          --firstname Wildfire \
          --lastname Admin \
          --role Admin \
          --email admin@example.com \
          --password admin || true &&
        airflow scheduler &
        exec airflow webserver

volumes:
  minio-data:
  kafka-data:
  airflow-logs:
